services:
  - type: web
    name: jkhoa-php-wordpress
    runtime: docker
    plan: free
    domains:
      - php.jkhoa.dev
    envVars:
      - key: WORDPRESS_DB_HOST
        fromDatabase:
          name: wp-db
          property: host
      - key: WORDPRESS_DB_USER
        fromDatabase:
          name: wp-db
          property: user
      - key: WORDPRESS_DB_PASSWORD
        fromDatabase:
          name: wp-db
          property: password
      - key: WORDPRESS_DB_NAME
        fromDatabase:
          name: wp-db
          property: database

databases:
  - name: wp-db
    databaseName: wordpress
    user: wpadmin
    plan: free
